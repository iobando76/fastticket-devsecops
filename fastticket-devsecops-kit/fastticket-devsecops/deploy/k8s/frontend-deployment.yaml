apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastticket-frontend
  namespace: fastticket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastticket-frontend
  template:
    metadata:
      labels:
        app: fastticket-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: ghcr.io/example/fastticket-frontend:prod
          ports:
            - containerPort: 4173
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 4173
            initialDelaySeconds: 10
            periodSeconds: 10
