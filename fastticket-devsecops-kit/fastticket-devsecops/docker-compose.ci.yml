services:
  mongo:
    image: mongo:7
    container_name: fastticket-mongo-ci
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fastticket-backend-ci
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/fastticket_ci
      JWT_SECRET: change_me_in_ci
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fastticket-frontend-ci
    environment:
      VITE_API_URL: http://backend:5000
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4173/"]
      interval: 15s
      timeout: 5s
      retries: 10
